{{- if .Values.openvsx.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.openvsx.setup.name }}
  namespace: {{ .Values.openvsx.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.openvsx.setup.name }}
  namespace: {{ .Values.openvsx.namespace }}
{{- end }}