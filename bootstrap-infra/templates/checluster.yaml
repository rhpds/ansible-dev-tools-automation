---
apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: {{ .Values.cheCluster.name }}
  namespace: {{ .Values.cheCluster.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  components:
    cheServer:
      debug: false
      logLevel: INFO
    dashboard:
      logLevel: ERROR
    devWorkspace: {}
    devfileRegistry:
      disableInternalRegistry: true
    imagePuller:
      enable: false
      spec: {}
    metrics:
      enable: true
    pluginRegistry:
      openVSXURL: "https://open-vsx.org"
  containerRegistry: {}
  devEnvironments:
    startTimeoutSeconds: 1000
    security: {}
    secondsOfRunBeforeIdling: -1
    maxNumberOfWorkspacesPerUser: -1
    disableContainerBuildCapabilities: false
    disableContainerRunCapabilities: false
    ignoredUnrecoverableEvents:
    - FailedScheduling
    defaultEditor: che-incubator/che-code/latest
    maxNumberOfRunningWorkspacesPerUser: 5
    defaultComponents:
    - container:
        image: "{{ .Values.cheCluster.container.image }}"
        memoryLimit: 4Gi
        memoryRequest: 2Gi
        cpuLimit: 1000m
        cpuRequest: 500m
        mountSources: true
        sourceMapping: /projects
      name: dev-tools
    defaultNamespace:
      autoProvision: true
      template: <username>-devspaces
    secondsOfInactivityBeforeIdling: 3600
    storage:
      pvcStrategy: per-workspace
  gitServices: {}
  networking: {}
