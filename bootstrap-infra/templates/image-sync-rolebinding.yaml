{{- if .Values.imageSync.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.imageSync.name }}
  namespace: {{ .Values.imageSync.destination.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.imageSync.name }}
  namespace: {{ .Values.cheCluster.namespace }}
{{- end }}
