{{- if .Values.imageSync.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.imageSync.name }}-pull-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.imageSync.name }}-pull-secret-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.imageSync.name }}
  namespace: {{ .Values.cheCluster.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.imageSync.name }}-pull-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["pull-secret"]
  verbs: ["get"]
{{- end }}
